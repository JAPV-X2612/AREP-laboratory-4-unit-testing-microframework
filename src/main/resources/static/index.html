<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroSpringBoot IoC Framework</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1   { color: #2c3e50; }
        a    { color: #2980b9; }
        ul   { line-height: 2; }
    </style>
</head>
<body>
<h1>🚀 MicroSpringBoot IoC Framework</h1>
<p>Welcome to the lightweight IoC web framework built with Java Reflection.</p>
<h2>Available Endpoints</h2>
<ul>
    <li><a href="/">GET /</a> — Static greeting</li>
    <li><a href="/greeting">GET /greeting</a> — Greeting with default name</li>
    <li><a href="/greeting?name=AREP">GET /greeting?name=AREP</a> — Greeting with custom name</li>
</ul>
<img src="image.png" alt="Sample Image" width="80%" height="auto">
</body>
</html>
